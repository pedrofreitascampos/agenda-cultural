<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Agora — Agenda Cultural de Portugal</title>
  <meta name="description" content="Descobre eventos culturais em Portugal num mapa interativo. Musica, teatro, exposições, cinema e mais.">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="anonymous">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr" crossorigin="anonymous"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Config: try prod (committed), local overrides if present -->
  <script src="config.prod.js"></script>
  <script src="config.js" onerror=""></script>

  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <!-- ─── Notification Bar ─────────────────────────────── -->
  <div id="notification-bar" class="notification-bar hidden"></div>

  <!-- ─── Header ──────────────────────────────────────── -->
  <header id="header">
    <div class="header-left">
      <h1 class="logo">Agora</h1>
      <span class="logo-sub">Agenda Cultural</span>
    </div>
    <nav class="header-tabs">
      <button class="tab-btn active" data-view="map">Mapa</button>
      <button class="tab-btn" data-view="timeline">Timeline</button>
      <button class="tab-btn" data-view="agenda">A Minha Agenda</button>
    </nav>
    <div class="header-right">
      <span id="event-count" class="event-count"></span>
      <button id="auth-btn" class="auth-btn hidden" title="Iniciar sessão">Entrar</button>
      <button id="settings-btn" class="settings-btn" title="Fontes de dados">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Main Layout ─────────────────────────────────── -->
  <div id="main">

    <!-- Filter Panel (desktop: sidebar, mobile: bottom sheet) -->
    <aside id="filter-panel">
      <div class="filter-handle" id="filter-handle"></div>

      <div class="filter-section">
        <input type="text" id="search-input" class="filter-input" placeholder="Pesquisar eventos ou locais...">
      </div>

      <div class="filter-section">
        <label class="filter-label">Datas</label>
        <div class="date-shortcuts" id="date-shortcuts">
          <button class="date-shortcut-btn" data-shortcut="today">Hoje</button>
          <button class="date-shortcut-btn" data-shortcut="3days">3 dias</button>
          <button class="date-shortcut-btn" data-shortcut="weekend">Fim-de-semana</button>
          <button class="date-shortcut-btn" data-shortcut="week">Semana</button>
        </div>
        <div class="date-inputs">
          <input type="date" id="date-from" class="filter-input">
          <span class="date-sep">–</span>
          <input type="date" id="date-to" class="filter-input">
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Categorias</label>
        <div id="category-filters" class="category-chips"></div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Cidade</label>
        <select id="city-filter" class="filter-input">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="filter-section filter-actions">
        <button id="clear-filters" class="btn-secondary">Limpar filtros</button>
      </div>
    </aside>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Timeline View (hidden by default) -->
    <div id="timeline-view" class="hidden">
      <div id="timeline-content" class="timeline-content"></div>
    </div>

    <!-- Agenda View (hidden by default) -->
    <div id="agenda-view" class="hidden">
      <div class="agenda-toolbar">
        <div class="agenda-filters" id="agenda-filters">
          <button class="agenda-filter-btn active" data-filter="all">Todos</button>
          <button class="agenda-filter-btn" data-filter="watching">A ver</button>
          <button class="agenda-filter-btn" data-filter="attending">Confirmados</button>
          <button class="agenda-filter-btn" data-filter="custom">Os meus</button>
        </div>
        <button id="add-event-btn" class="btn-add-event">+ Adicionar evento</button>
      </div>
      <div id="agenda-content" class="agenda-content">
        <div class="agenda-empty">
          <p>Marca eventos como "A ver" ou "Confirmado" para os veres aqui.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Event Detail Drawer ─────────────────────────── -->
  <div id="event-detail" class="event-detail hidden">
    <button id="detail-close" class="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>

  <!-- ─── Add Custom Event Modal ──────────────────────── -->
  <div id="event-modal" class="settings-panel hidden">
    <div class="settings-backdrop" id="event-modal-backdrop"></div>
    <div class="settings-drawer">
      <div class="settings-header">
        <h2 class="settings-title" id="event-modal-title">Adicionar Evento</h2>
        <button id="event-modal-close" class="detail-close">&times;</button>
      </div>
      <form id="event-form" class="event-form">
        <div class="form-group">
          <label class="filter-label" for="ef-title">Titulo *</label>
          <input type="text" id="ef-title" class="filter-input" required placeholder="Nome do evento">
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-venue">Local</label>
          <input type="text" id="ef-venue" class="filter-input" placeholder="Nome do local">
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-city">Cidade</label>
          <input type="text" id="ef-city" class="filter-input" placeholder="Lisboa, Porto, ...">
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-category">Categoria</label>
          <select id="ef-category" class="filter-input">
            <option value="music">Musica</option>
            <option value="theatre">Teatro</option>
            <option value="dance">Danca</option>
            <option value="cinema">Cinema</option>
            <option value="exhibitions">Exposicoes</option>
            <option value="workshops">Workshops</option>
            <option value="festivals">Festivais</option>
            <option value="literature">Literatura</option>
            <option value="family">Familias</option>
            <option value="other" selected>Outros</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="filter-label" for="ef-date-start">Data inicio *</label>
            <input type="date" id="ef-date-start" class="filter-input" required>
          </div>
          <div class="form-group" style="flex:1">
            <label class="filter-label" for="ef-date-end">Data fim</label>
            <input type="date" id="ef-date-end" class="filter-input">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="filter-label" for="ef-time-start">Hora inicio</label>
            <input type="time" id="ef-time-start" class="filter-input">
          </div>
          <div class="form-group" style="flex:1">
            <label class="filter-label" for="ef-time-end">Hora fim</label>
            <input type="time" id="ef-time-end" class="filter-input">
          </div>
        </div>
        <div class="form-group">
          <label class="filter-label">Recorrencia</label>
          <select id="ef-recurrence" class="filter-input">
            <option value="">Evento unico</option>
            <option value="daily">Diario</option>
            <option value="weekly">Semanal</option>
            <option value="biweekly">Quinzenal</option>
            <option value="monthly">Mensal</option>
          </select>
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-cost">Preco</label>
          <input type="text" id="ef-cost" class="filter-input" placeholder="Gratuito, 10€, ...">
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-url">Link</label>
          <input type="url" id="ef-url" class="filter-input" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="filter-label" for="ef-notes">Notas</label>
          <textarea id="ef-notes" class="filter-input" rows="3" placeholder="Notas pessoais..."></textarea>
        </div>
        <label class="toggle-row" style="padding:4px 0">
          <span>Partilhar com outros</span>
          <input type="checkbox" id="ef-shared">
          <span class="toggle-slider"></span>
        </label>
        <div class="form-actions">
          <button type="button" id="ef-delete" class="btn-danger hidden">Apagar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Settings Panel (Sources) ─────────────────────── -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-backdrop" id="settings-backdrop"></div>
    <div class="settings-drawer">
      <div class="settings-header">
        <h2 class="settings-title">Fontes de Dados</h2>
        <button id="settings-close" class="detail-close">&times;</button>
      </div>
      <div id="sources-list" class="sources-list"></div>
      <div class="settings-section">
        <h3 class="settings-subtitle">Meteorologia</h3>
        <label class="toggle-row">
          <span>Mostrar tempo no mapa</span>
          <input type="checkbox" id="weather-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-section">
        <h3 class="settings-subtitle">Notificações</h3>
        <label class="toggle-row">
          <span>Avisar sobre eventos próximos</span>
          <input type="checkbox" id="notifications-toggle">
          <span class="toggle-slider"></span>
        </label>
        <div class="notif-days-row" id="notif-days-row">
          <label class="filter-label" for="notif-days">Avisar com antecedência de</label>
          <select id="notif-days" class="filter-input" style="width:auto">
            <option value="0">No dia</option>
            <option value="1" selected>1 dia</option>
            <option value="3">3 dias</option>
            <option value="7">1 semana</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Weather Widget (map overlay) ────────────────── -->
  <div id="weather-widget" class="weather-widget"></div>

  <!-- ─── Toast Container ─────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="app.js?v=1" defer></script>
</body>
</html>
