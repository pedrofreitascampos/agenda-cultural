name: Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch, normalize, geocode events
        run: node pipeline/fetch.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/sources.json data/venue-cache.json
          git diff --cached --quiet || git commit -m "data: update events $(date -u +%Y-%m-%d)"
          git push
